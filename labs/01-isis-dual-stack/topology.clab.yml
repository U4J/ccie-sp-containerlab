name: ccie-sp-isis

mgmt:
  network: ccie-sp-isis-mgmt
  ipv4-subnet: 172.31.10.0/24

topology:
  defaults:
    kind: linux
    image: quay.io/frrouting/frr:10.6.1
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv6.conf.all.forwarding: 1
      net.ipv4.conf.all.rp_filter: 0
      net.ipv4.conf.default.rp_filter: 0
    binds:
      - configs/__clabNodeName__/frr.conf:/etc/frr/frr.conf:ro
      - configs/daemons:/etc/frr/daemons:ro
      - configs/vtysh.conf:/etc/frr/vtysh.conf:ro

  nodes:
    pe1:
      mgmt-ipv4: 172.31.10.11
    p1:
      mgmt-ipv4: 172.31.10.12
    p2:
      mgmt-ipv4: 172.31.10.13
    pe2:
      mgmt-ipv4: 172.31.10.14

  links:
    - endpoints: ["pe1:eth1", "p1:eth1"]
    - endpoints: ["pe1:eth2", "p2:eth1"]
    - endpoints: ["p1:eth2", "pe2:eth1"]
    - endpoints: ["p2:eth2", "pe2:eth2"]

