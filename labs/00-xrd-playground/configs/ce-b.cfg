!
hostname {{ .ShortName }}
!
username clab
 group root-lr
 group cisco-support
 secret clab@123
!
line default
 transport input ssh
!
interface MgmtEth0/RP0/CPU0/0
{{ if .Env.CLAB_MGMT_VRF }} vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
!
interface GigabitEthernet0/0/0/0
 description CE-B-to-PE-2
 ipv4 address 192.0.2.3 255.255.255.254
!
interface Loopback0
 description CE-B-test-loopback
 ipv4 address 198.51.100.2 255.255.255.255
!
router static
 address-family ipv4 unicast
  0.0.0.0/0 GigabitEthernet0/0/0/0 192.0.2.2
 !
{{- if .Env.CLAB_MGMT_VRF }}
 vrf {{ .Env.CLAB_MGMT_VRF }}
  address-family ipv4 unicast
{{- if .MgmtIPv4Gateway }}
   0.0.0.0/0 MgmtEth0/RP0/CPU0/0 {{ .MgmtIPv4Gateway }}
{{- end}}
  !
 !
{{- end}}
!
ssh server v2
{{- if .Env.CLAB_MGMT_VRF }}
ssh server vrf {{ .Env.CLAB_MGMT_VRF }}
{{- end}}
end
