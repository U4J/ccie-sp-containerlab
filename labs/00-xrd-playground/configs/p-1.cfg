!
hostname {{ .ShortName }}
!
username clab
 group root-lr
 group cisco-support
 secret clab@123
!
line default
 transport input ssh
!
interface MgmtEth0/RP0/CPU0/0
{{ if .Env.CLAB_MGMT_VRF }} vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
!
interface GigabitEthernet0/0/0/0
 description P-1-to-PE-1
 ipv4 address 10.0.0.1 255.255.255.254
!
interface GigabitEthernet0/0/0/1
 description P-1-to-P-2
 ipv4 address 10.0.0.2 255.255.255.254
!
interface Loopback0
 ipv4 address 10.255.0.2 255.255.255.255
!
router isis CORE
 net 49.0001.0102.5500.0002.00
 is-type level-2-only
 log-adjacency-changes
 address-family ipv4 unicast
  metric-style wide
  mpls ldp sync
 !
 interface Loopback0
  address-family ipv4 unicast
   passive
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  address-family ipv4 unicast
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  !
 !
!
mpls ldp
 router-id 10.255.0.2
 interface GigabitEthernet0/0/0/0
 !
 interface GigabitEthernet0/0/0/1
 !
!
ssh server v2
{{- if .Env.CLAB_MGMT_VRF }}
ssh server vrf {{ .Env.CLAB_MGMT_VRF }}
{{- end}}
end
