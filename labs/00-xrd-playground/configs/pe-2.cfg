!
hostname {{ .ShortName }}
!
username clab
 group root-lr
 group cisco-support
 secret clab@123
!
line default
 transport input ssh
!
interface MgmtEth0/RP0/CPU0/0
{{ if .Env.CLAB_MGMT_VRF }} vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
!
interface GigabitEthernet0/0/0/0
 description PE-2-to-P-2
 ipv4 address 10.0.0.5 255.255.255.254
!
interface GigabitEthernet0/0/0/1
 description PE-2-to-CE-B
 ipv4 address 192.0.2.2 255.255.255.254
!
interface Loopback0
 ipv4 address 10.255.0.4 255.255.255.255
!
router static
 address-family ipv4 unicast
  198.51.100.2/32 GigabitEthernet0/0/0/1 192.0.2.3
 !
{{- if .Env.CLAB_MGMT_VRF }}
 vrf {{ .Env.CLAB_MGMT_VRF }}
  address-family ipv4 unicast
{{- if .MgmtIPv4Gateway }}
   0.0.0.0/0 MgmtEth0/RP0/CPU0/0 {{ .MgmtIPv4Gateway }}
{{- end}}
  !
 !
{{- end}}
!
router isis CORE
 net 49.0001.0102.5500.0004.00
 is-type level-2-only
 log-adjacency-changes
 mpls ldp sync
 address-family ipv4 unicast
  metric-style wide
  redistribute static
 !
 interface Loopback0
  address-family ipv4 unicast
   passive
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  address-family ipv4 unicast
  !
 !
!
mpls ldp
 router-id 10.255.0.4
 interface GigabitEthernet0/0/0/0
 !
!
ssh server v2
{{- if .Env.CLAB_MGMT_VRF }}
ssh server vrf {{ .Env.CLAB_MGMT_VRF }}
{{- end}}
end
